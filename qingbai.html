<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>《青白》副本加载中…</title>
  <meta name="description" content="青白剧本杀倒计时 — 6月20日 下午2:00">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --qing: #5ecfc6;
      --qing-dim: #2a8a82;
      --bai: #e8f4f2;
      --bai-soft: rgba(232, 244, 242, 0.72);
      --ink: #0a1218;
      --ink-2: rgba(8, 16, 22, 0.82);
      --glow: rgba(94, 207, 198, 0.45);
      --serif: "Noto Serif SC", "Songti SC", serif;
      --mono: "JetBrains Mono", ui-monospace, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: var(--serif);
      color: var(--bai);
      background: var(--ink);
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
    }

    .bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(6, 12, 18, 0.55) 0%, rgba(6, 12, 18, 0.88) 55%, rgba(6, 12, 18, 0.96) 100%),
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(94, 207, 198, 0.12), transparent);
    }

    .mist {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.6;
    }

    .page {
      position: relative;
      z-index: 2;
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 20px 56px;
    }

    .system-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--qing);
      margin-bottom: 28px;
      opacity: 0.9;
    }

    .system-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--qing);
      box-shadow: 0 0 12px var(--glow);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    .hero {
      text-align: center;
      margin-bottom: 32px;
    }

    .title-cn {
      font-size: clamp(3rem, 14vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.35em;
      margin-right: -0.35em;
      line-height: 1.1;
      background: linear-gradient(165deg, #fff 20%, var(--qing) 70%, var(--qing-dim));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 30px rgba(94, 207, 198, 0.25));
    }

    .title-sub {
      margin-top: 14px;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--bai-soft);
      letter-spacing: 0.08em;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 18px;
    }

    .tag {
      font-family: var(--mono);
      font-size: 0.68rem;
      padding: 5px 12px;
      border: 1px solid rgba(94, 207, 198, 0.35);
      border-radius: 999px;
      color: var(--qing);
      background: rgba(94, 207, 198, 0.08);
    }

    .quote-box {
      text-align: center;
      padding: 20px 24px;
      margin-bottom: 28px;
      border-left: 2px solid var(--qing);
      border-right: 2px solid rgba(255, 255, 255, 0.08);
      background: rgba(8, 16, 22, 0.55);
      backdrop-filter: blur(8px);
      border-radius: 4px;
    }

    .quote-text {
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
      font-style: italic;
      color: var(--bai-soft);
      line-height: 1.8;
      min-height: 3.2em;
      transition: opacity 0.5s;
    }

    .quote-text.fade { opacity: 0; }

    .quote-attr {
      margin-top: 10px;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--qing-dim);
      letter-spacing: 0.06em;
    }

    .card {
      background: var(--ink-2);
      border: 1px solid rgba(94, 207, 198, 0.18);
      border-radius: 12px;
      padding: 28px 24px;
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .event-info {
      text-align: center;
      margin-bottom: 28px;
    }

    .event-name {
      font-size: 1.35rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .event-time {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--qing);
    }

    .status {
      text-align: center;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--qing);
      margin-bottom: 20px;
      letter-spacing: 0.06em;
    }

    .status.ended { color: #f08080; }

    .timer-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    @media (max-width: 420px) {
      .timer-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .timer-unit {
      text-align: center;
      padding: 18px 8px;
      background: rgba(94, 207, 198, 0.06);
      border: 1px solid rgba(94, 207, 198, 0.15);
      border-radius: 10px;
    }

    .timer-value {
      font-family: var(--mono);
      font-size: clamp(1.8rem, 7vw, 2.6rem);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: #fff;
      line-height: 1;
    }

    .timer-label {
      margin-top: 8px;
      font-size: 0.75rem;
      color: var(--bai-soft);
      letter-spacing: 0.2em;
    }

    .load-bar {
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .load-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--qing-dim), var(--qing));
      border-radius: 2px;
      transition: width 1s linear;
      box-shadow: 0 0 10px var(--glow);
    }

    .load-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: rgba(232, 244, 242, 0.45);
      text-align: right;
      margin-bottom: 24px;
    }

    .chars-title {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      color: rgba(232, 244, 242, 0.5);
      margin-bottom: 14px;
      text-align: center;
    }

    .chars {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    @media (max-width: 480px) {
      .chars { grid-template-columns: repeat(2, 1fr); }
    }

    .char {
      padding: 12px 10px;
      text-align: center;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.03);
      transition: border-color 0.2s, background 0.2s;
    }

    .char:hover {
      border-color: rgba(94, 207, 198, 0.3);
      background: rgba(94, 207, 198, 0.06);
    }

    .char-name {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .char-role {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--qing-dim);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    button {
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 12px 22px;
      border-radius: 8px;
      border: 1px solid rgba(94, 207, 198, 0.4);
      background: rgba(94, 207, 198, 0.12);
      color: var(--qing);
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
    }

    button:hover { background: rgba(94, 207, 198, 0.22); }
    button:active { transform: scale(0.98); }
    button.copied {
      border-color: rgba(120, 220, 160, 0.5);
      color: #78dca0;
      background: rgba(120, 220, 160, 0.1);
    }

    footer {
      text-align: center;
      margin-top: 36px;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: rgba(232, 244, 242, 0.3);
      letter-spacing: 0.08em;
    }

    .snake-deco {
      position: fixed;
      bottom: -40px;
      right: -20px;
      width: 200px;
      height: 200px;
      opacity: 0.06;
      z-index: 1;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="bg">
    <img src="assets/qingbai-bg.png" alt="">
  </div>
  <div class="mist"></div>

  <svg class="snake-deco" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M180 120C160 80 120 60 80 80C40 100 20 140 40 170C60 150 100 130 140 140C160 145 175 135 180 120Z" stroke="#5ecfc6" stroke-width="2"/>
    <path d="M20 60C40 40 80 30 110 50C140 70 150 100 130 130" stroke="#e8f4f2" stroke-width="1.5" opacity="0.6"/>
  </svg>

  <div class="page">
    <div class="system-bar">
      <span class="system-dot"></span>
      <span id="system-text">副本《青白》加载成功，游戏，开始</span>
    </div>

    <header class="hero">
      <h1 class="title-cn">青白</h1>
      <p class="title-sub">南山 · 复活系列首部 · 无限流穿书情感本</p>
      <div class="tags">
        <span class="tag">无限流</span>
        <span class="tag">穿书</span>
        <span class="tag">情感</span>
        <span class="tag">6人</span>
        <span class="tag">8-10h</span>
      </div>
    </header>

    <div class="quote-box">
      <p class="quote-text" id="quote">「我在幻想，你本来的样子也可以爱我至死。」</p>
      <p class="quote-attr" id="quote-attr">— 青白副本</p>
    </div>

    <div class="card">
      <div class="event-info">
        <p class="event-name">青白剧本杀</p>
        <p class="event-time">2026年6月20日 · 下午 2:00</p>
      </div>

      <p class="status" id="status">副本同步中…</p>

      <div class="timer-grid">
        <div class="timer-unit">
          <div class="timer-value" id="days">00</div>
          <div class="timer-label">天</div>
        </div>
        <div class="timer-unit">
          <div class="timer-value" id="hours">00</div>
          <div class="timer-label">时</div>
        </div>
        <div class="timer-unit">
          <div class="timer-value" id="minutes">00</div>
          <div class="timer-label">分</div>
        </div>
        <div class="timer-unit">
          <div class="timer-value" id="seconds">00</div>
          <div class="timer-label">秒</div>
        </div>
      </div>

      <div class="load-bar"><div class="load-fill" id="load-fill"></div></div>
      <p class="load-label" id="load-label">副本加载进度 0%</p>

      <p class="chars-title">— 角色档案 —</p>
      <div class="chars">
        <div class="char"><div class="char-name">沈青</div><div class="char-role">受虐狂 · 小青鱼</div></div>
        <div class="char"><div class="char-name">苏无度</div><div class="char-role">恋爱脑 · 饕餮</div></div>
        <div class="char"><div class="char-name">白怜</div><div class="char-role">偏执狂 · 小白蛇</div></div>
        <div class="char"><div class="char-name">魏玉卿</div><div class="char-role">圣母 · 群像</div></div>
        <div class="char"><div class="char-name">苏无恙</div><div class="char-role">收藏家 · 高视角</div></div>
        <div class="char"><div class="char-name">阿喜</div><div class="char-role">胆小鬼 · 成长</div></div>
      </div>

      <div class="actions">
        <button id="btn-copy">复制分享链接</button>
      </div>
    </div>

    <footer>玩家既是书中人，也是执笔人 · 十八个结局，等你书写</footer>
  </div>

  <script>
    const END_TIME = new Date("2026-06-20T14:00:00").getTime();
    const TOTAL_MS = END_TIME - new Date("2026-06-15T00:00:00").getTime();

    const quotes = [
      { text: "「我在幻想，你本来的样子也可以爱我至死。」", attr: "— 青白副本" },
      { text: "「副本《青白》加载成功，游戏，开始。」", attr: "— 系统提示" },
      { text: "「神明死后，万物有情。」", attr: "— 沈青" },
      { text: "「饕餮最爱吃的，还是全鱼宴。」", attr: "— 苏无度" },
      { text: "「小白蛇能有什么坏心思呢？」", attr: "— 白怜" },
      { text: "「你既是书中人，也是执笔人。」", attr: "— 青白" },
    ];

    let quoteIdx = 0;

    function pad(n) { return String(n).padStart(2, "0"); }

    function updateTimer() {
      const now = Date.now();
      const diff = END_TIME - now;
      const status = document.getElementById("status");
      const loadFill = document.getElementById("load-fill");
      const loadLabel = document.getElementById("load-label");

      if (diff <= 0) {
        document.getElementById("days").textContent = "00";
        document.getElementById("hours").textContent = "00";
        document.getElementById("minutes").textContent = "00";
        document.getElementById("seconds").textContent = "00";
        status.textContent = "副本已开启 — 游戏，开始！";
        status.className = "status ended";
        loadFill.style.width = "100%";
        loadLabel.textContent = "副本加载进度 100%";
        document.getElementById("system-text").textContent = "副本已激活，祝各位玩家入戏";
        return;
      }

      const totalSec = Math.floor(diff / 1000);
      document.getElementById("days").textContent = pad(Math.floor(totalSec / 86400));
      document.getElementById("hours").textContent = pad(Math.floor((totalSec % 86400) / 3600));
      document.getElementById("minutes").textContent = pad(Math.floor((totalSec % 3600) / 60));
      document.getElementById("seconds").textContent = pad(totalSec % 60);

      const elapsed = END_TIME - now;
      const progress = Math.min(100, Math.max(0, ((TOTAL_MS - elapsed) / TOTAL_MS) * 100));
      loadFill.style.width = progress.toFixed(1) + "%";
      loadLabel.textContent = "副本加载进度 " + progress.toFixed(1) + "%";
      status.textContent = "距离入本还有";
      status.className = "status";
    }

    function rotateQuote() {
      const el = document.getElementById("quote");
      const attr = document.getElementById("quote-attr");
      el.classList.add("fade");
      setTimeout(() => {
        quoteIdx = (quoteIdx + 1) % quotes.length;
        el.textContent = quotes[quoteIdx].text;
        attr.textContent = quotes[quoteIdx].attr;
        el.classList.remove("fade");
      }, 500);
    }

    document.getElementById("btn-copy").addEventListener("click", async () => {
      const btn = document.getElementById("btn-copy");
      const url = window.location.href.split("?")[0];
      try {
        await navigator.clipboard.writeText(url);
      } catch {
        const ta = document.createElement("textarea");
        ta.value = url;
        ta.style.cssText = "position:fixed;opacity:0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
      }
      btn.textContent = "已复制！";
      btn.classList.add("copied");
      setTimeout(() => {
        btn.textContent = "复制分享链接";
        btn.classList.remove("copied");
      }, 2000);
    });

    updateTimer();
    setInterval(updateTimer, 1000);
    setInterval(rotateQuote, 6000);
  </script>
</body>
</html>
